<!DOCTYPE html>
<html>
 <head>
  <title>Ivy Chobanyan WEBGIS LAB03</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.3.4/dist/leaflet.css"crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.3.4/dist/leaflet.js"crossorigin=""></script>
  <script src="https://dsps.lib.uiowa.edu/placing/public/leafletSlider-1.0.2/leaflet.SliderControl.min.js"></script>
  <script src="OK_Census_Counties.js"></script>
  <script src="OK_Major_Cities.js"></script>
  <script src="OK_Orphaned_Wells.js"></script>
  <script src="OK_Census_Wells.js"></script>
  <script src="OK_Well_Distance.js"></script>
  <script src="OK_Municipal_Boundaries.js"></script>
  <style type="text/css">
    html, body { margin: 0; padding: 0; height: 100%; }
    #map { min-height: 100%; }
      .legend {
        padding: 6px 8px;
        line-height: 18px;
        background: rgba(255,255,255,0.9);
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
        border-radius: 5px;
      }
      .legend i {
        width: 18px;
        height: 18px;
        float: left;
        margin-right: 8px;
        opacity: 0.7;
      }
  </style>
</head>
<body>
  <div id="map"></div>
  <script type="text/javascript">

    

    var map = L.map('map', {center: [35.5, -98],zoom: 7.3});

    var canvas = L.tileLayer('https://tile.openstreetmap.bzh/ca/{z}/{x}/{y}.png', {
	    maxZoom: 19,
	    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, Tiles courtesy of <a href="https://www.openstreetmap.cat" target="_blank">Breton OpenStreetMap Team</a>'
    });

    var Esri_WorldGrayCanvas = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
	  attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ',
    maxZoom: 16
    }).addTo(map);

    var labelWells =
      function(feature, layer) {
        if (feature.properties) {
          var prop = feature.properties;
          var popup = '<b>'+ prop['Well_name']+' '+prop['Well_numbe']+'</b>, ' + prop['Type'] + '<br>' 
          + prop['HubDist'].toFixed(2) +' miles from ' + prop['HubName'];
          feature.layer = layer;
          layer.bindPopup(popup, {maxWidth: "auto"});
        }
      }; 

      var labelCities =
      function(feature, layer) {
        if (feature.properties) {
          var prop = feature.properties;
          var popup = '<b>'+ prop['NAME']+'</b><br>Population: ' + prop['POPULATION'];
          feature.layer = layer;
          layer.bindPopup(popup, {maxWidth: "auto"});
        }
      }; 

    var counties = L.geoJson(OK_census_counties, {style:choropleth_population}).addTo(map);
    var counties_wells = L.geoJson(OK_census_wells, {style:choropleth_wells});
    
    var municipal = new L.geoJson(OK_municipal_boundaries, {style:{
      fillColor: 'black',
      weight: 1,
      opacity: 0.5,
      color: 'black',
      fillOpacity: 0.2
    }}).addTo(map);

    var wells = new L.geoJson(OK_well_distance, {
      onEachFeature : labelWells,
      pointToLayer:
      function(feature, latlng){
        return L.circleMarker(latlng, {
        radius: 2,
        fillColor: "#cc4c02",
        color: "#8c2d04",
        weight: 1,
        opacity: 0.8,
        fillOpacity: 0.5
        });
      }
    }).addTo(map);

    var wells_dist = new L.geoJson(OK_well_distance, {
      onEachFeature : labelWells,
      pointToLayer:
      function(feature, latlng){
        return L.circleMarker(latlng, {
        radius: 2,
        fillColor: getColorByDistance(feature.properties.HubDist),
        color: getColorByDistance(feature.properties.HubDist),
        weight: 1,
        opacity: 0.8,
        fillOpacity: 0.5
        });
      }
    });

    

    var cities = new L.geoJson(OK_major_cities, {
      onEachFeature : labelCities,
      pointToLayer:
      function(feature, latlng){
        return L.circleMarker(latlng, {
        radius: 4,
        fillColor: "#000",
        color: "#000",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.8
        });
      }
    }).addTo(map);

    var basemaps = {
    };
    var overlaymaps = {
      "Census Counties":counties,
      "Wells per County": counties_wells,
      "Municipal Areas": municipal,
      "Major Cities":cities,
      "All Orphaned Wells": wells,
      "Orphaned Wells by Distance":wells_dist,
    };

    function getColorByPop(value) {
      return value > 80000 ? '#034e7b':
        value > 60000 ? '#0570b0': 
        value > 40000 ? '#74a9cf':
        value > 25000 ? '#74a9cf':
        value > 15000 ? '#a6bddb':
        value > 10000 ? '#d0d1e6':
        '#f1eef6';
      }
    function choropleth_population(feature){
      return {
        fillColor: getColorByPop(feature.properties.POPULATION),
        weight: 1,
        opacity: 1,
        color: 'black',
        fillOpacity: 1
      };
    }

    function getColorByWells(value) {
      return value > 500 ? '#4a1486':
        value > 150 ? '#6a51a3': 
        value > 50 ? '#807dba':
        value > 25 ? '#9e9ac8':
        value > 10 ? '#bcbddc':
        value > 5 ? '#dadaeb':
        '#f2f0f7';
      }

    function choropleth_wells(feature){
      return {
        fillColor: getColorByWells(feature.properties.NUMWELLS),
        weight: 1,
        opacity: 1,
        color: 'black',
        fillOpacity: 1
      };
    }

    function getColorByDistance(value) {
      return value > 90 ? '#ffffb2':
        value > 25 ? '#fed976': 
        value > 20 ? '#feb24c':
        value > 15 ? '#fd8d3c':
        value > 10 ? '#fc4e2a':
        value > 5 ? '#e31a1c':
        '#b10026';
      }

    L.control.layers(basemaps, overlaymaps, {collapsed:false}).addTo(map);

    var legendPop = L.control({position: 'bottomleft'}); // Try the other lower corner if you prefer.
   
    legendPop.onAdd = function (map) {
      var div = L.DomUtil.create('div', 'legend'),
      grades = [0, 10000, 15000, 25000, 40000, 60000, 80000]; // break values to define the intervals of population - YOU WILL NEED TO MODIFY IT TO GET THE RIGHT LEGEND BREAKS
      div.innerHTML = '<b>Census Population<br><br></b>';

      // Loop through the classes or “grades” and generate a label with a colored square for each interval.
      for (var i = 0; i < grades.length; i++) {
       div.innerHTML += 
        '<i style="background:' + getColorByPop(grades[i] + 1) + '"></i>' + 
        grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br><br>' : '+');
      }return div;
    };

    var legendWells = L.control({position: 'bottomleft'}); // Try the other lower corner if you prefer.
   
    legendWells.onAdd = function (map) {
      var div = L.DomUtil.create('div', 'legend'),
      grades = [0, 5, 10, 25, 50, 150, 500]; // break values to define the intervals of population - YOU WILL NEED TO MODIFY IT TO GET THE RIGHT LEGEND BREAKS
      div.innerHTML = '<b>Wells Per County<br><br></b>';

      // Loop through the classes or “grades” and generate a label with a colored square for each interval.
      for (var i = 0; i < grades.length; i++) {
       div.innerHTML += 
        '<i style="background:' + getColorByWells(grades[i] + 1) + '"></i>' + 
        grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br><br>' : '+');
      }return div;
    };

    legendPop.addTo(map);
    // Removing the legend when the layer is removed
    map.on('overlayremove', function(eventLayer){
      if (eventLayer.name == 'Census Counties'){ // We use the key/display name to refer to the layer
        map.removeControl(legendPop); // legend is the variable name of the layerlegend
      }
      if (eventLayer.name == 'Wells per County'){
        map.removeControl(legendWells);
      }
    });
    // Adding the legend when the layer is added
    map.on('overlayadd', function(eventLayer){
      if (eventLayer.name == 'Census Counties'){
        legendPop.addTo(map);
      }
      if (eventLayer.name == 'Wells per County'){
        legendWells.addTo(map);
      }
    });
  </script>
</body>
</html>
